# ============================================================
# TEST 环境配置
# 敏感配置（数据库/Redis/JWT/七牛/企微/SSO）全部由 Nacos 注入
# Nacos Data ID: ticket-platform-secrets.yml
# ============================================================

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 60000
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-test-query: SELECT 1

  flyway:
    enabled: false

  redis:
    database: 1
    timeout: 10000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

wecom:
  image:
    enabled: true
    association-window-minutes: 5
    timeout-strategy: CREATE_TICKET
    notify-on-pending: false
    max-images-per-ticket: 10
    video-decrypt-in-memory-max-mb: 8

qiniu:
  zone: z2
  token-expire-seconds: 3600
  image-path-prefix: ticket/images/
  max-file-size-mb: 10

dev-login:
  enabled: true

management:
  health:
    rabbit:
      enabled: false

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.miduo.cloud.ticket: debug
    org.springframework: warn
