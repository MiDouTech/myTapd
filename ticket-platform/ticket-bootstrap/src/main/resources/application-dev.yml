spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ticket_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: miduo,./147
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    encoding: UTF-8
    validate-on-migrate: true
    out-of-order: false
    table: flyway_schema_history
    clean-disabled: true

  redis:
    host: localhost
    port: 6379
    database: 0
    timeout: 10000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

wecom:
  corp-id: ${WECOM_CORP_ID:}
  agent-id: ${WECOM_AGENT_ID:}
  secret: ${WECOM_SECRET:}
  contact-secret: ${WECOM_CONTACT_SECRET:}
  callback-token: ${WECOM_CALLBACK_TOKEN:}
  callback-aes-key: ${WECOM_CALLBACK_AES_KEY:}
  trusted-domain: ${WECOM_TRUSTED_DOMAIN:ticket.company.com}
  mq:
    enabled: false
  image:
    enabled: true
    association-window-minutes: 5
    timeout-strategy: CREATE_TICKET
    notify-on-pending: false
    max-images-per-ticket: 10

ticket:
  detail-url: ${TICKET_DETAIL_URL:http://ticket.t.miduonet.com/open/ticket}

qiniu:
  access-key: ${QINIU_ACCESS_KEY:GZuoSAtSoVpjNU4Ajsu70uxMwGCg_k8b77iGXZaR}
  secret-key: ${QINIU_SECRET_KEY:GZuoSAtSoVpjNU4Ajsu70uxMwGCg_k8b77iGXZaR}
  bucket: ${QINIU_BUCKET:imgweixin12315comcn}
  domain: ${QINIU_DOMAIN:https://image.qn.weixin12315.com.cn/}
  zone: ${QINIU_ZONE:z0}
  token-expire-seconds: 3600
  image-path-prefix: ticket/images/
  max-file-size-mb: 10

jwt:
  secret: miduo-ticket-platform-jwt-secret-key-2026-must-be-long-enough
  access-token-expire: 1800
  refresh-token-expire: 604800
  token-prefix: "Bearer "
  header-name: Authorization

logging:
  level:
    com.miduo.cloud.ticket: debug

dev-login:
  enabled: true
