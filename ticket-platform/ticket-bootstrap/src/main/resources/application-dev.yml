# ============================================================
# DEV 环境配置
# 敏感配置（数据库/Redis/JWT/七牛/企微/SSO）全部由 Nacos 注入
# Nacos Data ID: ticket-platform-secrets.yml
# ============================================================

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 60000
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-test-query: SELECT 1

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    encoding: UTF-8
    validate-on-migrate: true
    out-of-order: false
    table: flyway_schema_history
    clean-disabled: true

  redis:
    database: 0
    timeout: 10000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

wecom:
  image:
    enabled: true
    association-window-minutes: 5
    timeout-strategy: CREATE_TICKET
    notify-on-pending: false
    max-images-per-ticket: 10
    # 视频：加密包小于等于该值(MB)走内存解密，大于则临时文件分块解密（大视频防 OOM）
    video-decrypt-in-memory-max-mb: 8
    # video-temp-directory: /var/tmp/wecom-video

qiniu:
  zone: z2
  token-expire-seconds: 3600
  image-path-prefix: ticket/images/
  max-file-size-mb: 10

dev-login:
  enabled: true
  username: ${DEV_LOGIN_USERNAME:admin}
  password: ${DEV_LOGIN_PASSWORD:}
  phone-password: ${DEV_LOGIN_PHONE_PASSWORD:}

logging:
  level:
    com.miduo.cloud.ticket: debug
