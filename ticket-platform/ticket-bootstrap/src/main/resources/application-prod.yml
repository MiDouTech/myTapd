# ============================================================
# PROD 环境配置
# 敏感配置（数据库/Redis/JWT/七牛/企微/SSO）全部由 Nacos 注入
# Nacos Data ID（敏感）: ticket-platform-secrets.yaml（bootstrap shared-configs）
# ============================================================

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 60000
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-test-query: SELECT 1

  flyway:
    # 与 dev 一致：发布新镜像时自动执行增量迁移，避免代码已引用新列而库未升级（如 bug_report.resolve_time）
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    encoding: UTF-8
    validate-on-migrate: true
    ignore-migration-patterns: "*:missing"
    out-of-order: false
    table: flyway_schema_history
    clean-disabled: true

  redis:
    database: 1
    timeout: 10000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

wecom:
  image:
    enabled: true
    association-window-minutes: 5
    timeout-strategy: CREATE_TICKET
    notify-on-pending: false
    max-images-per-ticket: 10
    video-decrypt-in-memory-max-mb: 8

qiniu:
  zone: z2
  token-expire-seconds: 3600
  image-path-prefix: ticket/images/
  video-path-prefix: ticket/videos/
  attachment-path-prefix: ticket/attachments/
  max-file-size-mb: 10
  attachment-max-file-size-mb: 200

dev-login:
  enabled: false

management:
  health:
    rabbit:
      enabled: false

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    com.miduo.cloud.ticket: info
    org.springframework: warn
