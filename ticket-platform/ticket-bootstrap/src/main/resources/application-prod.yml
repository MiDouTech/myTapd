spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.1.100:3306/ticket_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: your_mysql_password
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      connection-timeout: 60000
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-test-query: SELECT 1

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    encoding: UTF-8
    validate-on-migrate: true
    out-of-order: false
    table: flyway_schema_history
    clean-disabled: true

  redis:
    host: 192.168.1.101
    port: 6379
    password: your_redis_password
    database: 0
    timeout: 10000
    lettuce:
      pool:
        max-active: 8
        max-wait: -1
        max-idle: 8
        min-idle: 0

miduo:
  sso:
    enabled: ${MIDUO_SSO_ENABLED:false}
    base-url: ${MIDUO_SSO_BASE_URL:}
    app-code: ${MIDUO_SSO_APP_CODE:}
    app-secret: ${MIDUO_SSO_APP_SECRET:}
    shortcut-id: ${MIDUO_SSO_SHORTCUT_ID:}
    redirect-uri: ${MIDUO_SSO_REDIRECT_URI:}

wecom:
  corp-id: 
  agent-id: 
  secret: 
  contact-secret: 
  callback-token: 
  callback-aes-key: 
  trusted-domain: ticket.your-company.com
  mq:
    enabled: false

ticket:
  detail-url: ${TICKET_DETAIL_URL:https://ticket.your-company.com/open/ticket}

jwt:
  secret: your_jwt_secret_key_must_be_at_least_64_characters_long_replace_this
  access-token-expire: 7200
  refresh-token-expire: 604800
  token-prefix: "Bearer "
  header-name: Authorization

management:
  health:
    rabbit:
      enabled: false

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    com.miduo.cloud.ticket: info
    org.springframework: warn
