name: Build & Push to GHCR + CNB

# 触发条件：推送 main 分支或版本标签，PR 只构建不发布
on:
  push:
    branches: [ "main" ]
    tags:     [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]

env:
  # GitHub Container Registry
  GHCR_REGISTRY: ghcr.io
  # 腾讯云 CNB 镜像仓库
  CNB_REGISTRY: cnb.cool
  CNB_NAMESPACE: miduoyanfa/middleground/docker_images

# ──────────────────────────────────────────────────────────────────────────────
# Job 1 – 构建 Spring Boot JAR，同时推送到 GHCR 和 CNB
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  build-backend:
    name: Backend – Build JAR & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: "8"
          distribution: "temurin"
          cache: "maven"

      - name: Build backend JAR
        working-directory: ticket-platform
        run: mvn clean package -DskipTests -pl ticket-bootstrap -am -B

      # ── 同时登录两个镜像仓库 ────────────────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to CNB
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CNB_REGISTRY }}
          username: ${{ secrets.CNB_USERNAME }}
          password: ${{ secrets.CNB_PASSWORD }}

      # ── 同时生成两个仓库的 Tag ──────────────────────────────────────────────
      - name: Extract Docker metadata (backend)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/ticket-platform-backend
            ${{ env.CNB_REGISTRY }}/${{ env.CNB_NAMESPACE }}/ticket-platform-backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=pr

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 构建一次，同时推送到 GHCR 和 CNB ────────────────────────────────────
      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ticket-platform
          file:    ticket-platform/deployment/docker/Dockerfile
          push:    ${{ github.event_name != 'pull_request' }}
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2 – 构建 Vue3 前端静态文件，打包成 ZIP
  # ──────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Frontend – Build & Upload ZIP
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: miduo-frontend/package-lock.json

      - name: Install dependencies
        working-directory: miduo-frontend
        run: npm ci

      - name: Build frontend
        working-directory: miduo-frontend
        env:
          VITE_APP_TITLE: 米多工单系统
          VITE_API_BASE_URL: /api
          VITE_USE_PROXY: "false"
          VITE_WECOM_OAUTH_URL: ${{ secrets.VITE_WECOM_OAUTH_URL }}
        run: npm run build

      - name: Zip dist folder
        run: |
          cd miduo-frontend/dist
          zip -r ../../ticket-platform-frontend.zip .
          echo "ZIP size: $(du -sh ../../ticket-platform-frontend.zip | cut -f1)"

      - name: Upload dist ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ticket-platform-frontend-${{ github.sha }}
          path: ticket-platform-frontend.zip
          retention-days: 7

      - name: Attach ZIP to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ticket-platform-frontend.zip

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3 – 汇总
  # ──────────────────────────────────────────────────────────────────────────
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [ build-backend, build-frontend ]
    if: ${{ github.event_name != 'pull_request' }}
    steps:
      - name: Print summary
        run: |
          echo "## 本次构建产物" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 类型 | 仓库 | 镜像地址 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| 后端镜像 | GHCR | \`ghcr.io/${{ github.repository_owner }}/ticket-platform-backend:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 后端镜像 | CNB  | \`cnb.cool/miduoyanfa/middleground/docker_images/ticket-platform-backend:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 前端静态包 | Artifacts | \`ticket-platform-frontend-${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
