name: CD – Build & Push Docker Images

# 合并到受保护分支或推送版本 Tag 后触发
on:
  push:
    branches:
      - main
      - master
      - develop
      - 'release/**'
    tags:
      - 'v*.*.*'

env:
  GHCR_REGISTRY: ghcr.io
  CNB_REGISTRY: docker.cnb.cool

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1 – 读取配置文件，生成后续 Job 所需的输出变量和矩阵
  # ────────────────────────────────────────────────────────────────────────────
  prepare:
    name: Prepare – Load Config & Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix:            ${{ steps.services.outputs.matrix }}
      has_prebuilt:      ${{ steps.services.outputs.has_prebuilt }}
      build_type:        ${{ steps.config.outputs.build_type }}
      java_version:      ${{ steps.config.outputs.java_version }}
      dotnet_version:    ${{ steps.config.outputs.dotnet_version }}
      build_subproject:  ${{ steps.config.outputs.build_subproject }}
      compile_dir:       ${{ steps.config.outputs.compile_dir }}
      cnb_namespace:          ${{ steps.config.outputs.cnb_namespace }}
      cnb_version_repo:       ${{ steps.config.outputs.cnb_version_repo }}
      frontend_dir:           ${{ steps.config.outputs.frontend_dir }}
      node_version:           ${{ steps.config.outputs.node_version }}
      frontend_artifact_name: ${{ steps.config.outputs.frontend_artifact_name }}
      static_repo_url:        ${{ steps.config.outputs.static_repo_url }}
      static_repo_path:       ${{ steps.config.outputs.static_repo_path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load deploy config
        id: config
        run: |
          set -a
          source .deploy/config.env
          set +a
          echo "build_type=${BUILD_TYPE}"               >> "$GITHUB_OUTPUT"
          echo "java_version=${JAVA_VERSION:-}"         >> "$GITHUB_OUTPUT"
          echo "dotnet_version=${DOTNET_VERSION:-}"     >> "$GITHUB_OUTPUT"
          echo "build_subproject=${BUILD_SUBPROJECT:-}" >> "$GITHUB_OUTPUT"
          echo "cnb_namespace=${CNB_NAMESPACE}"                     >> "$GITHUB_OUTPUT"
          echo "cnb_version_repo=${CNB_VERSION_REPO}"               >> "$GITHUB_OUTPUT"
          echo "frontend_dir=${FRONTEND_DIR:-}"                     >> "$GITHUB_OUTPUT"
          echo "node_version=${NODE_VERSION:-20}"                   >> "$GITHUB_OUTPUT"
          echo "frontend_artifact_name=${FRONTEND_ARTIFACT_NAME:-}" >> "$GITHUB_OUTPUT"
          echo "static_repo_url=${STATIC_REPO_URL:-}"               >> "$GITHUB_OUTPUT"
          echo "static_repo_path=${STATIC_REPO_PATH:-}"             >> "$GITHUB_OUTPUT"
          # 从 services.json 取第一个有 build_output 服务的 context 作为编译工作目录
          COMPILE_DIR=$(jq -r \
            '[.[] | select(.build_output != null and .build_output != "")] | first | .context // "."' \
            .deploy/services.json)
          echo "compile_dir=${COMPILE_DIR}" >> "$GITHUB_OUTPUT"

      - name: Build services matrix
        id: services
        run: |
          echo "matrix=$(jq -c '{include: .}' .deploy/services.json)" >> "$GITHUB_OUTPUT"
          # 是否有需要预编译的服务（build_output 非空）
          HAS=$(jq '[.[] | select(.build_output != null and .build_output != "")] | length > 0' \
            .deploy/services.json)
          echo "has_prebuilt=${HAS}" >> "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2 – 编译后端产物（仅当存在需要预编译的服务时运行）
  # ────────────────────────────────────────────────────────────────────────────
  compile:
    name: Compile – ${{ needs.prepare.outputs.build_type }}
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.has_prebuilt == 'true'
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Java ───────────────────────────────────────────────────────────────
      - name: Set up JDK ${{ needs.prepare.outputs.java_version }} (Temurin)
        if: needs.prepare.outputs.build_type == 'java'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ needs.prepare.outputs.java_version }}
          distribution: temurin
          cache: maven

      - name: Build JAR (Maven, skip tests)
        if: needs.prepare.outputs.build_type == 'java'
        working-directory: ${{ needs.prepare.outputs.compile_dir }}
        env:
          BUILD_SUBPROJECT: ${{ needs.prepare.outputs.build_subproject }}
        run: |
          if [ -n "$BUILD_SUBPROJECT" ]; then
            mvn clean package -DskipTests -pl "$BUILD_SUBPROJECT" -am -B
          else
            mvn clean package -DskipTests -B
          fi

      # ── .NET ───────────────────────────────────────────────────────────────
      - name: Set up .NET ${{ needs.prepare.outputs.dotnet_version }}
        if: needs.prepare.outputs.build_type == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ needs.prepare.outputs.dotnet_version }}

      - name: Publish (.NET, skip tests)
        if: needs.prepare.outputs.build_type == 'dotnet'
        working-directory: ${{ needs.prepare.outputs.compile_dir }}
        run: dotnet publish --configuration Release --no-restore

      # ── 打包所有 build_output 目录并上传 ───────────────────────────────────
      - name: Archive build artifacts
        run: |
          jq -r \
            '[.[] | select(.build_output != null and .build_output != "")] | .[].build_output' \
            .deploy/services.json | \
          xargs -d '\n' tar -czf /tmp/build-artifacts.tar.gz --ignore-failed-read

      - name: Upload compiled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: /tmp/build-artifacts.tar.gz
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # Job 3 – 前端编译并打包为 ZIP（与后端镜像构建并行，FRONTEND_DIR 为空则跳过）
  # ────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend – ZIP
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.frontend_dir != ''
    permissions:
      contents: write
    outputs:
      download_url: ${{ steps.push_static.outputs.download_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ needs.prepare.outputs.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ needs.prepare.outputs.node_version }}
          cache: npm
          cache-dependency-path: ${{ needs.prepare.outputs.frontend_dir }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ needs.prepare.outputs.frontend_dir }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ needs.prepare.outputs.frontend_dir }}
        env:
          VITE_WECOM_OAUTH_URL: ${{ secrets.VITE_WECOM_OAUTH_URL }}
        run: npm run build

      - name: Package dist as ZIP
        run: |
          ARTIFACT="${{ needs.prepare.outputs.frontend_artifact_name }}"
          cd "${{ needs.prepare.outputs.frontend_dir }}/dist"
          zip -r "$GITHUB_WORKSPACE/${ARTIFACT}.zip" .
          echo "ZIP size: $(du -sh "$GITHUB_WORKSPACE/${ARTIFACT}.zip" | cut -f1)"

      # ── 推送 ZIP 到 CNB 静态仓库，输出下载链接 ───────────────────────────────
      - name: Push ZIP to CNB static repo
        id: push_static
        if: needs.prepare.outputs.static_repo_url != ''
        env:
          CNB_TOKEN:        ${{ secrets.CNB_TOKEN }}
          STATIC_REPO_URL:  ${{ needs.prepare.outputs.static_repo_url }}
          STATIC_REPO_PATH: ${{ needs.prepare.outputs.static_repo_path }}
          ARTIFACT:         ${{ needs.prepare.outputs.frontend_artifact_name }}
        run: |
          # 计算版本号（与 update-version 保持一致）
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="sha-${GITHUB_SHA:0:7}"
          fi

          # 配置 git 凭证
          STATIC_HOST="${STATIC_REPO_URL#https://}"
          STATIC_HOST="${STATIC_HOST%%/*}"
          git config --global credential.helper store
          printf 'https://cnb:%s@%s\n' "${CNB_TOKEN}" "${STATIC_HOST}" \
            >> ~/.git-credentials
          chmod 600 ~/.git-credentials

          # 克隆静态仓库
          git clone "${STATIC_REPO_URL}" _static_repo

          # 创建目录并复制 ZIP
          DEST_DIR="_static_repo/${STATIC_REPO_PATH}/${ARTIFACT}/${VERSION}"
          mkdir -p "${DEST_DIR}"
          cp "${ARTIFACT}.zip" "${DEST_DIR}/"

          # 提交并推送
          cd _static_repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add .
          git commit -m "chore: publish frontend ${VERSION} [skip ci]"
          git push

          # 输出下载链接
          DOWNLOAD_URL="${STATIC_REPO_URL}/-/git/raw/main/${STATIC_REPO_PATH}/${ARTIFACT}/${VERSION}/${ARTIFACT}.zip?download=true"
          echo "download_url=${DOWNLOAD_URL}" >> "$GITHUB_OUTPUT"
          echo "Frontend ZIP download URL: ${DOWNLOAD_URL}"

      - name: Upload ZIP artifact (7-day retention)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.prepare.outputs.frontend_artifact_name }}-${{ github.sha }}
          path: ${{ needs.prepare.outputs.frontend_artifact_name }}.zip
          retention-days: 7

      - name: Attach ZIP to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ needs.prepare.outputs.frontend_artifact_name }}.zip

  # ────────────────────────────────────────────────────────────────────────────
  # Job 4 – 并行构建所有镜像并同时推送到 GHCR 和 CNB
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push – ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: [prepare, compile]
    # compile 可能被跳过（无预编译服务），用 always() 保证矩阵 Job 仍能运行
    if: |
      always() &&
      needs.prepare.result == 'success' &&
      (needs.compile.result == 'success' || needs.compile.result == 'skipped')
    permissions:
      contents: read
      packages: write
    strategy:
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 下载并恢复预编译产物（仅对有 build_output 的服务）─────────────────
      - name: Download compiled artifacts
        if: matrix.build_output != ''
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: /tmp

      - name: Restore build artifacts into workspace
        if: matrix.build_output != ''
        run: tar -xzf /tmp/build-artifacts.tar.gz -C "$GITHUB_WORKSPACE"

      # ── Docker 准备 ────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to CNB
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CNB_REGISTRY }}
          username: cnb
          password: ${{ secrets.CNB_TOKEN }}

      # ── 计算 release/* 分支的 rc-* Tag（去掉 release/ 前缀）───────────────
      - name: Compute release branch tag
        id: branch_tag
        run: |
          if [[ "$GITHUB_REF" == refs/heads/release/* ]]; then
            suffix="${GITHUB_REF_NAME#release/}"
            echo "rc_tag=rc-${suffix}" >> "$GITHUB_OUTPUT"
            echo "is_release=true"     >> "$GITHUB_OUTPUT"
          else
            echo "rc_tag="             >> "$GITHUB_OUTPUT"
            echo "is_release=false"    >> "$GITHUB_OUTPUT"
          fi

      # ── 同时为 GHCR 和 CNB 生成镜像 Tag ───────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GHCR_REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
            ${{ env.CNB_REGISTRY }}/${{ needs.prepare.outputs.cnb_namespace }}/${{ matrix.name }}
          tags: |
            # main / master → latest + sha-xxxxxxx
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            # develop → dev-latest + sha-xxxxxxx
            type=raw,value=dev-latest,enable=${{ github.ref == 'refs/heads/develop' }}
            # release/* → rc-{分支名} + sha-xxxxxxx
            type=raw,value=${{ steps.branch_tag.outputs.rc_tag }},enable=${{ steps.branch_tag.outputs.is_release == 'true' }}
            # 所有推送都附加 sha-xxxxxxx
            type=sha,prefix=sha-,format=short
            # v*.*.* Tag → 语义版本号（仅 Tag 推送时生成）
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # ── 一次构建，同时推送到 GHCR 和 CNB ──────────────────────────────────
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context:    ${{ matrix.context }}
          file:       ${{ matrix.dockerfile }}
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to:   type=gha,scope=${{ matrix.name }},mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # Job 5 – 所有产物就绪后，将版本号写入 CNB 版本记录仓库
  # ────────────────────────────────────────────────────────────────────────────
  update-version:
    name: Update CNB Version File
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push, build-frontend]
    # build-frontend 可能被跳过（FRONTEND_DIR 为空），用 always() 兼容
    if: |
      always() &&
      needs.build-and-push.result == 'success' &&
      (needs.build-frontend.result == 'success' || needs.build-frontend.result == 'skipped')

    steps:
      - name: Checkout（读取 services.json）
        uses: actions/checkout@v4

      # 分支推送 → sha-短哈希；Tag 推送 → Tag 名
      - name: Determine deploy version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=sha-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone CNB version repo and update .cnbVersion.yml
        env:
          CNB_TOKEN:            ${{ secrets.CNB_TOKEN }}
          CNB_VERSION_REPO:     ${{ needs.prepare.outputs.cnb_version_repo }}
          VERSION:              ${{ steps.version.outputs.value }}
          FRONTEND_DOWNLOAD_URL: ${{ needs.build-frontend.outputs.download_url }}
        run: |
          # 配置 git 凭证（避免 token 出现在 URL 明文中）
          CNB_HOST="${CNB_VERSION_REPO#https://}"
          CNB_HOST="${CNB_HOST%%/*}"
          git config --global credential.helper store
          printf 'https://cnb:%s@%s\n' "${CNB_TOKEN}" "${CNB_HOST}" \
            >> ~/.git-credentials
          chmod 600 ~/.git-credentials

          git clone "${CNB_VERSION_REPO}" _version_repo
          cd _version_repo

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

          # 生成 .cnb_version.yml（使用 printf 避免 heredoc 缩进问题）
          {
            printf 'version: "%s"\n'    "${VERSION}"
            printf 'commit: "%s"\n'     "${GITHUB_SHA:0:7}"
            printf 'repository: "%s"\n' "${GITHUB_REPOSITORY}"
            printf 'ref: "%s"\n'        "${GITHUB_REF_NAME}"
            printf 'updatedAt: "%s"\n'  "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            printf 'services:\n'
            jq -r '.[].name' "$GITHUB_WORKSPACE/.deploy/services.json" | \
              while IFS= read -r svc; do
                printf '  %s: "%s"\n' "${svc}" "${VERSION}"
              done
            # 仅当前端 ZIP 推送成功时写入下载链接
            if [ -n "${FRONTEND_DOWNLOAD_URL}" ]; then
              printf 'frontendDownloadUrl: "%s"\n' "${FRONTEND_DOWNLOAD_URL}"
            fi
          } > .cnb_version.yml

          sed -i "s|testVersion:.*|testVersion: ${VERSION}|" .cnb/web_trigger.yml

          git add .cnb/web_trigger.yml
          git add .cnb_version.yml
          if git diff --staged --quiet; then
            echo ".cnb_version.yml 无变化，跳过提交。"
          else
            git commit -m "chore: update version to ${VERSION}"
            git push
          fi
