name: CD – Build & Push Docker Images

# 合并到受保护分支或推送版本 Tag 后触发
on:
  push:
    branches:
      - main
      - master
      - develop
      - 'release/**'
    tags:
      - 'v*.*.*'

  pull_request:
    branches:
      - main
      - master
      - develop
      - 'release/**'

  workflow_dispatch:
    inputs:
      service_names:
        description: "后端构建服务：ticket-platform-backend"
        type: choice
        default: ''
        options:
          - ''
          - ticket-platform-backend
      
      frontend_names:
        description: "前端构建服务: ticket-platform"
        type: choice
        default: ''
        options:
          - ''
          - ticket-platform

env:
  GHCR_REGISTRY: ghcr.io
  CNB_REGISTRY: docker.cnb.cool

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1 – 读取配置文件，生成后续 Job 所需的输出变量和矩阵
  # ────────────────────────────────────────────────────────────────────────────
  prepare:
    name: Prepare – Load Config & Build Matrix
    runs-on: ubuntu-latest
    outputs:
      has_prebuilt:      ${{ steps.services.outputs.has_prebuilt }}
      build_type:        ${{ steps.config.outputs.build_type }}
      java_version:      ${{ steps.config.outputs.java_version }}
      dotnet_version:    ${{ steps.config.outputs.dotnet_version }}
      build_subproject:  ${{ steps.config.outputs.build_subproject }}
      cnb_namespace:          ${{ steps.config.outputs.cnb_namespace }}
      cnb_version_repo:       ${{ steps.config.outputs.cnb_version_repo }}
      static_repo_url:        ${{ steps.config.outputs.static_repo_url }}
      static_repo_path:       ${{ steps.config.outputs.static_repo_path }}
      services:               ${{ steps.config.outputs.services }}
      frontends:              ${{ steps.config.outputs.frontends }}
      prod_branches:           ${{ steps.config.outputs.prod_branches }}
      has_frontend:           ${{ steps.config.outputs.has_frontend }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Load deploy config
        id: config
        run: |

          set -a
          source .deploy/config.env
          set +a
          echo "build_type=${BUILD_TYPE}"               >> "$GITHUB_OUTPUT"
          echo "java_version=${JAVA_VERSION:-}"         >> "$GITHUB_OUTPUT"
          echo "dotnet_version=${DOTNET_VERSION:-}"     >> "$GITHUB_OUTPUT"
          echo "build_subproject=${BUILD_SUBPROJECT:-}" >> "$GITHUB_OUTPUT"
          echo "cnb_namespace=${CNB_NAMESPACE}"                     >> "$GITHUB_OUTPUT"
          echo "cnb_version_repo=${CNB_VERSION_REPO}"               >> "$GITHUB_OUTPUT"
          echo "static_repo_url=${STATIC_REPO_URL:-}"               >> "$GITHUB_OUTPUT"
          echo "static_repo_path=${STATIC_REPO_PATH:-}"             >> "$GITHUB_OUTPUT"
          echo "prod_branches=${PROD_BRANCHES:-}"                   >> "$GITHUB_OUTPUT"


          # ────────────────────────────────────────────────────────────────────────────
          # 后端构建判断逻辑
          # ────────────────────────────────────────────────────────────────────────────
          ALL_SERVICES=$(cat .deploy/services.json | jq -c .)

          ##判断是否手动触发任务
          if [[ ${{ github.event_name }} == "workflow_dispatch" ]] && \
            [[ -n "${{ inputs.service_names }}" ]]; then
            echo "手动触发任务：${{ inputs.service_names }}"
            IFS=',' read -ra NAMES <<< "${{ inputs.service_names }}"
            FILTERED="[]"
            for name in "${NAMES[@]}"; do
              echo "当前服务：${name}"
              name=$(echo "${name}" | xargs )
              svc=$(echo $ALL_SERVICES | jq -c --arg n "$name" '.[] | select(.name == $n)')
              if [[ -n "$svc" ]]; then
                FILTERED=$(echo $FILTERED | jq -c --argjson s "$svc" '. + [$s]')
              else
                echo "服务 ${name} 不存在"
                exit 1
              fi
            done
            SERVICES=$FILTERED

          elif [[ "${{ github.ref }}" == refs/tags/* ]] || \
            [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]] || \
            [[ ${{ github.event_name }} == "pull_request" ]]; then

            echo "全量构建所有服务"
            SERVICES=$ALL_SERVICES

          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null || echo "")
            echo "本次变动文件："; echo "$CHANGED"
            FILTERED="[]"
            while IFS= read -r svc; do
              name=$(echo "$svc" | jq -r '.name')
              IF_MANUAL=$(echo $svc | jq -c '.manual_only')
              if [[ "$IF_MANUAL" == "true" ]]; then
                echo "服务 ${name} 不是自动构建，跳过"
                continue
              fi

              matched=false
              BUILD_ON_ANY_PATH=$(echo $svc | jq -c '.build_on_any_path')
              if [[ "$BUILD_ON_ANY_PATH" == "true" ]] && [[ -n "$CHANGED" ]]; then
                matched=true
                echo "别管，改动就加入构建"
              else
                while IFS= read -r watch_path; do
                  if echo "$CHANGED" | grep -qE "^${watch_path}(/|$)" && echo $svc ; then
                    matched=true
                    break
                  fi
                done < <(echo "$svc" | jq -r '.watch_paths[]')
              fi

              if [[ "$matched" == "true" ]]; then
                echo "服务 ${name} 有文件变动，加入构建队列"
                FILTERED=$(echo $FILTERED | jq -c --argjson s "$svc" '. + [$s]')
              fi
            done < <(echo $ALL_SERVICES | jq -c '.[]')
            SERVICES=$FILTERED
          fi

          echo "参与构建的后端服务列表：${SERVICES}"
          echo "services=${SERVICES}" >> "$GITHUB_OUTPUT"

          ## ────────────────────────────────────────────────────────────────────────────
          ##前端构建判断逻辑
          ## ────────────────────────────────────────────────────────────────────────────
          if [ -f ".deploy/frontend.json" ]; then
            echo "has_frontend=true" >> "$GITHUB_OUTPUT"
            ALL_Frontends=$(cat .deploy/frontend.json | jq -c .)

            if [[ ${{ github.event_name }} == "workflow_dispatch" ]] && \
              [[ -n "${{ inputs.frontend_names }}" ]]; then
              echo "手动触发任务：${{ inputs.frontend_names }}"
              IFS=',' read -ra NAMES <<< "${{ inputs.frontend_names }}"
              FILTERED="[]"
              for name in "${NAMES[@]}"; do
                echo "当前服务：${name}"
                name=$(echo "${name}" | xargs )
                svc=$(echo $ALL_Frontends | jq -c --arg n "$name" '.[] | select(.name == $n)')
                if [[ -n "$svc" ]]; then
                  FILTERED=$(echo $FILTERED | jq -c --argjson s "$svc" '. + [$s]')
                else
                  echo "服务 ${name} 不存在"
                  exit 1
                fi
              done
              Frontends=$FILTERED
            
          elif [[ "${{ github.ref }}" == refs/tags/* ]] || \
            [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]] || \
            [[ ${{ github.event_name }} == "pull_request" ]]; then

            echo "全量构建所有服务"
            Frontends=$ALL_Frontends
          
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null || echo "")
            echo "本次变动文件："; echo "$CHANGED"
            FILTERED="[]"
            while IFS= read -r svc; do
              name=$(echo "$svc" | jq -r '.name')
              IF_MANUAL=$(echo $svc | jq -c '.manual_only')
              if [[ "$IF_MANUAL" == "true" ]]; then
                echo "服务 ${name} 不是自动构建，跳过"
                continue
              fi

              matched=false
              BUILD_ON_ANY_PATH=$(echo $svc | jq -c '.build_on_any_path')
              if [[ "$BUILD_ON_ANY_PATH" == "true" ]] && [[ -n "$CHANGED" ]]; then
                matched=true
                echo "别管，改动就加入构建"
              else
                while IFS= read -r watch_path; do
                  if echo "$CHANGED" | grep -qE "^${watch_path}(/|$)" && echo $svc ; then
                    matched=true
                    break
                  fi
                done < <(echo "$svc" | jq -r '.watch_paths[]')
              fi

              if [[ "$matched" == "true" ]]; then
                echo "服务 ${name} 有文件变动，加入构建队列"
                FILTERED=$(echo $FILTERED | jq -c --argjson s "$svc" '. + [$s]')
              fi

            done < <(echo $ALL_Frontends | jq -c '.[]')
            Frontends=$FILTERED
          fi
          else
            echo "has_frontend=false" >> "$GITHUB_OUTPUT"
          fi
          echo "参与构建的前端服务列表：$Frontends"
          echo "frontends=${Frontends}" >> "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2 – 前端编译并打包为 ZIP（与后端镜像构建并行，FRONTEND_DIR 为空则跳过）
  # ────────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend – ZIP
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.has_frontend == 'true' && needs.prepare.outputs.frontends != '[]'
    strategy:
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.frontends) }}
      fail-fast: false
    permissions:
      contents: write
    outputs:
      download_url: ${{ steps.push_static.outputs.download_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}
          cache: npm
          cache-dependency-path: ${{ matrix.context }}/package-lock.json

      - name: Install dependencies
        working-directory: ${{ matrix.context }}
        run: ${{ matrix.npm_install_command }}

      - name: Build frontend
        working-directory: ${{ matrix.context }}
        env:
          VITE_WECOM_OAUTH_URL: ${{ secrets.VITE_WECOM_OAUTH_URL }}
        run: ${{ matrix.npm_build_command }}

      - name: Package dist as ZIP
        run: |
          ARTIFACT="${{ matrix.artifact }}"
          cd "${{ matrix.context }}/dist"
          zip -r "$GITHUB_WORKSPACE/${ARTIFACT}.zip" .
          echo "ZIP size: $(du -sh "$GITHUB_WORKSPACE/${ARTIFACT}.zip" | cut -f1)"

      # ── 推送 ZIP 到 CNB 静态仓库，输出下载链接 ───────────────────────────────
      - name: Push ZIP to CNB static repo
        id: push_static
        if: needs.prepare.outputs.static_repo_url != '' &&  github.event_name != 'pull_request'
        env:
          CNB_TOKEN:        ${{ secrets.CNB_TOKEN }}
          STATIC_REPO_URL:  ${{ needs.prepare.outputs.static_repo_url }}
          STATIC_REPO_PATH: ${{ needs.prepare.outputs.static_repo_path }}
          ARTIFACT:         ${{ matrix.artifact }}
        run: |
          # 计算版本号（与 update-version 保持一致）
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="sha-${GITHUB_SHA:0:7}"
          fi

          # 配置 git 凭证
          STATIC_HOST="${STATIC_REPO_URL#https://}"
          STATIC_HOST="${STATIC_HOST%%/*}"
          git config --global credential.helper store
          printf 'https://cnb:%s@%s\n' "${CNB_TOKEN}" "${STATIC_HOST}" \
            >> ~/.git-credentials
          chmod 600 ~/.git-credentials

          # 克隆静态仓库
          git clone "${STATIC_REPO_URL}" _static_repo

          # 创建目录并复制 ZIP
          DEST_DIR="_static_repo/${STATIC_REPO_PATH}/${ARTIFACT}/${VERSION}"
          mkdir -p "${DEST_DIR}"
          cp "${ARTIFACT}.zip" "${DEST_DIR}/"

          # 提交并推送
          cd _static_repo
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add .
          git commit -m "chore: publish frontend ${VERSION} [skip ci]"
          git push

          # 输出下载链接
          DOWNLOAD_URL="${STATIC_REPO_URL}/-/git/raw/main/${STATIC_REPO_PATH}/${ARTIFACT}/${VERSION}/${ARTIFACT}.zip?download=true"
          echo "download_url=${DOWNLOAD_URL}" >> "$GITHUB_OUTPUT"
          echo "Frontend ZIP download URL: ${DOWNLOAD_URL}"


  # ────────────────────────────────────────────────────────────────────────────
  # Job 3 – 并行构建所有镜像并同时推送到 CNB
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push – ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.result == 'success' && needs.prepare.outputs.services != '[]'

    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.services) }}
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 按需编译后端（build_output 非空时运行）────────────────────────────
      - name: Set up JDK ${{ needs.prepare.outputs.java_version }} (Temurin)
        if: matrix.build_output != '' && needs.prepare.outputs.build_type == 'java'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ needs.prepare.outputs.java_version }}
          distribution: temurin
          cache: maven

      - name: Build JAR (Maven, skip tests)
        if: matrix.build_output != '' && needs.prepare.outputs.build_type == 'java'
        working-directory: ${{ matrix.context }}
        env:
          BUILD_SUBPROJECT: ${{ needs.prepare.outputs.build_subproject }}
        run: |
          if [ -n "$BUILD_SUBPROJECT" ]; then
            mvn clean package -DskipTests -pl "$BUILD_SUBPROJECT" -am -B
          else
            mvn clean package -DskipTests -B
          fi

      # ── Docker 准备 ────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Log in to CNB
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CNB_REGISTRY }}
          username: cnb
          password: ${{ secrets.CNB_TOKEN }}

      # ── 计算 release/* 分支的 rc-* Tag（去掉 release/ 前缀）───────────────
      - name: Compute release branch tag
        if: github.event_name != 'pull_request'
        id: branch_tag
        run: |
          if [[ "$GITHUB_REF" == refs/heads/release/* ]]; then
            suffix="${GITHUB_REF_NAME#release/}"
            echo "rc_tag=rc-${suffix}" >> "$GITHUB_OUTPUT"
            echo "is_release=true"     >> "$GITHUB_OUTPUT"
          else
            echo "rc_tag="             >> "$GITHUB_OUTPUT"
            echo "is_release=false"    >> "$GITHUB_OUTPUT"
          fi

      # ── 同时为 CNB 生成镜像 Tag ───────────────────────────────────
      - name: Extract Docker metadata
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.CNB_REGISTRY }}/${{ needs.prepare.outputs.cnb_namespace }}/${{ matrix.name }}
          tags: |
            # main / master → latest + sha-xxxxxxx
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
            # develop → dev-latest + sha-xxxxxxx
            type=raw,value=dev-latest,enable=${{ github.ref == 'refs/heads/develop' }}
            # release/* → rc-{分支名} + sha-xxxxxxx
            type=raw,value=${{ steps.branch_tag.outputs.rc_tag }},enable=${{ steps.branch_tag.outputs.is_release == 'true' }}
            # 所有推送都附加 sha-xxxxxxx
            type=sha,prefix=sha-,format=short
            # v*.*.* Tag → 语义版本号（仅 Tag 推送时生成）
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      # ── 一次构建，同时推送到CNB ──────────────────────────────────
      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context:    ${{ matrix.context }}
          file:       ${{ matrix.dockerfile }}
          push:       true
          tags:       ${{ steps.meta.outputs.tags }}
          labels:     ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to:   type=gha,scope=${{ matrix.name }},mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # Job 5 – 所有产物就绪后，将版本号写入 CNB 版本记录仓库 
  # ────────────────────────────────────────────────────────────────────────────
  update-version:
    name: Update CNB Version File
    runs-on: ubuntu-latest
    needs: [prepare, build-and-push, build-frontend]
    #Job 的运行策略配置块，控制这个 Job 怎么跑多个实例
    strategy:
      # false 表示其他实例失败继续跑，true 表示矩阵中任何一个实例失败，立刻取消其他所有正在运行的实例
      fail-fast: false
      #matrix 矩阵，表示这个 Job 要跑多个实例，每个实例对应一个服务
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.services != '[]' && needs.prepare.outputs.services || '[{"name":"__frontend_only__"}]') }}

    # 任一构建成功就更新版本；always() 允许读取已跳过/失败的依赖结果
    if: |
      always() &&
      !cancelled() &&
      github.event_name != 'pull_request' &&
      (
        needs.build-and-push.result == 'success' ||
        needs.build-frontend.result == 'success'
      )

    steps:
      - name: Checkout（读取 services.json）
        uses: actions/checkout@v4

      # 分支推送 → sha-短哈希；Tag 推送 → Tag 名
      - name: Determine deploy version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=sha-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone CNB version repo and update .cnbVersion.yml
        env:
          CNB_TOKEN:            ${{ secrets.CNB_TOKEN }}
          CNB_VERSION_REPO:     ${{ needs.prepare.outputs.cnb_version_repo }}
          VERSION:              ${{ steps.version.outputs.value }}
          FRONTEND_DOWNLOAD_URL: ${{ needs.build-frontend.outputs.download_url }}
          REPO_URL:  ${{ needs.prepare.outputs.cnb_version_repo }}
          AUTHOR:     ${{ github.actor }}
        run: |
          #一、变量初始化
          is_prod_branch=false 
          BACKEND_VERSION_FILE="testTicketBackendVersion.yml"
          FRONTEND_VERSION_FILE="testFrontendVersion.yml"

          DEPOLY_FILE=".cnb/web_trigger.yml"

          BRANCH_NAME=${GITHUB_REF_NAME}
          MSG=$(git log -1 --pretty=format:'%s%n%b')
          MSG_CLEAN=$(echo "${MSG}" | tr '\n' '  ')
          #容器版本信息:
          
          if [[ "${{ matrix.name }}" != "__frontend_only__" ]]; then
            DOCKER_VERSION_INFO="${{ env.CNB_REGISTRY }}/${{ needs.prepare.outputs.cnb_namespace }}/${{ matrix.name }}:${VERSION}"
          fi
          DOCKER_VERSION_ESC=$(escape_sed_replacement "${DOCKER_VERSION_INFO}")
          PUBLISH_TIME_ESC=$(escape_sed_replacement "$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')")

          #二、配置 git 凭证（避免 token 出现在 URL 明文中）
          AUTH_URL="${CNB_VERSION_REPO/https:\/\//https:\/\/cnb:${CNB_TOKEN}@}"
          rm -rf _version_repo
          git clone --depth=1 "${AUTH_URL}" _version_repo
          cd _version_repo

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
  
          ##三、判断当前分支是否能发布生产
          for branch in ${{ needs.prepare.outputs.prod_branches }}; do
            if [[ "${BRANCH_NAME}" == "${branch}" ]]; then
              is_prod_branch=true
              break
            fi
          done

          ##四、如果后端构建成功，则写入后端版本信息
          if [[ ${{needs.build-and-push.result }} == 'success' ]]; then    
            
            echo "##当前测试环境后端版本信息: " > ${BACKEND_VERSION_FILE}
            echo "version: ${VERSION}" >> ${BACKEND_VERSION_FILE}
            echo "branch_name: ${BRANCH_NAME}" >> ${BACKEND_VERSION_FILE} 
            echo "提交人: ${AUTHOR}" >> ${BACKEND_VERSION_FILE} 
            echo "服务提交信息: \"${MSG_CLEAN}\"" >> ${BACKEND_VERSION_FILE} 
            echo "容器版本信息: $DOCKER_VERSION_INFO" >> ${BACKEND_VERSION_FILE}
            echo "提交时间: $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> ${BACKEND_VERSION_FILE}

            if [[ "${is_prod_branch}" == "true" ]]; then
              sed -i "/- name: 生产发布-后端/,/提交时间: / {
                s|author.*|author: ${AUTHOR}|
                s|description: 生产后端发布.*|description: 生产后端发布-${AUTHOR}：${{ github.event.head_commit.message }}|
                s|message.*|message: \"${MSG_CLEAN}\"|
                s|deploy_version.*|deploy_version: $DOCKER_VERSION_INFO|
                s|publish_time.*|publish_time: $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')|}" ${DEPOLY_FILE}
            fi
          fi

          ##五、如果前端构建成功，则写入前端版本信息
          if [[ ${{needs.build-frontend.result }} == 'success' ]]; then       
            echo "##当前测试环境前端版本信息:" > ${FRONTEND_VERSION_FILE}
            echo "version: ${VERSION}" >> ${FRONTEND_VERSION_FILE}
            echo "branch_name: ${BRANCH_NAME}" >> ${FRONTEND_VERSION_FILE} 
            echo "提交人: ${AUTHOR}" >> ${FRONTEND_VERSION_FILE} 
            echo "服务提交信息: \"${MSG_CLEAN}\"" >> ${FRONTEND_VERSION_FILE} 
            echo "服务提交SHA: ${{ github.sha }}" >> ${FRONTEND_VERSION_FILE}
            echo "FrontendURL: ${FRONTEND_DOWNLOAD_URL}" >> ${FRONTEND_VERSION_FILE} 
            echo "提交时间: $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')" >> ${FRONTEND_VERSION_FILE}


             if [[ "${is_prod_branch}" == "true" ]]; then
              sed -i "/- name: 生产发布-前端/,/提交时间: / {
                s|author.*|author: ${AUTHOR}|
                s|description: 生产前端发布.*|description: 生产前端发布-${AUTHOR}：${{ github.event.head_commit.message }}|
                s|message.*|message: \"${MSG_CLEAN}\"|
                s|deploy_version.*|deploy_version: ${{ needs.build-frontend.outputs.download_url }}|
                s|publish_time.*|publish_time: $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')|}" ${DEPOLY_FILE}
            fi
          fi

          git add -f ${DEPOLY_FILE}
          if [[ -f "${BACKEND_VERSION_FILE}" ]]; then
            git add -f "${BACKEND_VERSION_FILE}"
          fi
          if [[ -f "${FRONTEND_VERSION_FILE}" ]]; then
            git add -f "${FRONTEND_VERSION_FILE}"
          fi
          git commit -m "提交人: ${AUTHOR} 提交信息: ${MSG_CLEAN}"
          git push



