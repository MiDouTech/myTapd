# ============================================================
# Nacos 配置 - PROD 环境
# Data ID: ticket-platform-secrets.yml
# Group: DEFAULT_GROUP
# Namespace: prod (需在 Nacos 中创建)
# 格式: YAML
#
# 使用说明：
#   将此文件内容导入 Nacos 控制台，或通过迁移脚本自动导入
#   请将 <YOUR_xxx> 占位符替换为真实值
# ============================================================

# ── 数据库配置 ──────────────────────────────────────────────
spring:
  datasource:
    url: jdbc:mysql://<YOUR_DB_HOST>:3306/ticket_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: <YOUR_DB_PASSWORD>

  redis:
    host: <YOUR_REDIS_HOST>
    port: 6379
    password: <YOUR_REDIS_PASSWORD>

# ── JWT 配置 ────────────────────────────────────────────────
jwt:
  secret: <YOUR_JWT_SECRET>
  access-token-expire: 7200
  refresh-token-expire: 604800
  token-prefix: "Bearer "
  header-name: Authorization

# ── 七牛云存储 ──────────────────────────────────────────────
qiniu:
  access-key: <YOUR_QINIU_ACCESS_KEY>
  secret-key: <YOUR_QINIU_SECRET_KEY>
  bucket: <YOUR_QINIU_BUCKET>
  domain: <YOUR_QINIU_DOMAIN>

# ── 企业微信 ────────────────────────────────────────────────
wecom:
  corp-id: <YOUR_WECOM_CORP_ID>
  agent-id: <YOUR_WECOM_AGENT_ID>
  secret: <YOUR_WECOM_SECRET>
  contact-secret: <YOUR_WECOM_CONTACT_SECRET>
  callback-token: <YOUR_WECOM_CALLBACK_TOKEN>
  callback-aes-key: <YOUR_WECOM_CALLBACK_AES_KEY>
  trusted-domain: <YOUR_WECOM_TRUSTED_DOMAIN>

# ── 米多SSO ─────────────────────────────────────────────────
miduo:
  sso:
    enabled: true
    base-url: <YOUR_MIDUO_SSO_BASE_URL>
    app-code: <YOUR_MIDUO_SSO_APP_CODE>
    app-secret: <YOUR_MIDUO_SSO_APP_SECRET>
    shortcut-id: <YOUR_MIDUO_SSO_SHORTCUT_ID>
    redirect-uri: <YOUR_MIDUO_SSO_REDIRECT_URI>

# ── 工单配置 ────────────────────────────────────────────────
ticket:
  detail-url: <YOUR_TICKET_DETAIL_URL>
