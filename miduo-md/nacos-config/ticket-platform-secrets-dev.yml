# ============================================================
# Nacos 配置 - DEV 环境
# Data ID: ticket-platform-secrets.yaml（与 bootstrap shared-configs 一致）
# Group: DEFAULT_GROUP
# Namespace: 与其他项目共用同一命名空间
# 格式: YAML
# ============================================================

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ticket_platform?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: <YOUR_DB_PASSWORD>

  redis:
    host: localhost
    port: 6379
    password: <YOUR_REDIS_PASSWORD>

  # 评论@等邮件通知（用户需维护 sys_user.email）；必须与 datasource/redis 同属一个 spring 节点，避免 YAML 重复键覆盖
  mail:
    host: <YOUR_SMTP_HOST>
    port: 587
    username: <YOUR_SMTP_USER>
    password: <YOUR_SMTP_PASSWORD>
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
      # 可选：与 username 不一致时作为发件人显示名邮箱
      # from: "工单系统 <noreply@example.com>"

jwt:
  secret: <YOUR_JWT_SECRET>
  access-token-expire: 7200
  refresh-token-expire: 604800
  token-prefix: "Bearer "
  header-name: Authorization

qiniu:
  access-key: <YOUR_QINIU_ACCESS_KEY>
  secret-key: <YOUR_QINIU_SECRET_KEY>
  bucket: <YOUR_QINIU_BUCKET>
  domain: <YOUR_QINIU_DOMAIN>

wecom:
  corp-id: <YOUR_WECOM_CORP_ID>
  agent-id: <YOUR_WECOM_AGENT_ID>
  secret: <YOUR_WECOM_SECRET>
  contact-secret: <YOUR_WECOM_CONTACT_SECRET>
  callback-token: <YOUR_WECOM_CALLBACK_TOKEN>
  callback-aes-key: <YOUR_WECOM_CALLBACK_AES_KEY>
  trusted-domain: <YOUR_WECOM_TRUSTED_DOMAIN>

miduo:
  sso:
    enabled: true
    base-url: <YOUR_MIDUO_SSO_BASE_URL>
    app-code: <YOUR_MIDUO_SSO_APP_CODE>
    app-secret: <YOUR_MIDUO_SSO_APP_SECRET>
    shortcut-id: <YOUR_MIDUO_SSO_SHORTCUT_ID>
    redirect-uri: <YOUR_MIDUO_SSO_REDIRECT_URI>

dev-login:
  password: <YOUR_DEV_LOGIN_PASSWORD>
  phone-password: <YOUR_DEV_PHONE_LOGIN_PASSWORD>

ticket:
  detail-url: <YOUR_TICKET_DETAIL_URL>
  # 内部前端根地址（无尾斜杠），用于企微卡片/邮件中的工单详情链接，如 https://ticket.example.com
  spa-detail-base-url: <YOUR_TICKET_SPA_BASE_URL>
