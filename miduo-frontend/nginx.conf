server {
    listen 80;
    server_name _;

    # Docker 内置 DNS：配合变量形式的 proxy_pass，避免解析到已销毁容器的旧 IP（常见 502）
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $ticket_backend_host backend;
    set $ticket_backend_port 8080;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # SPA fallback: all non-asset requests serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets: aggressive caching for hashed filenames
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy REST API requests to the backend service
    location /api/ {
        proxy_pass         http://$ticket_backend_host:$ticket_backend_port$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Proxy WebSocket notifications endpoint
    location /ws {
        proxy_pass         http://$ticket_backend_host:$ticket_backend_port$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # Deny access to dotfiles
    location ~ /\. {
        deny all;
    }
}
